# Nginx — доступ по IP (без домена)
#
# 1. Замените 123.45.67.89 на IP вашего VDS
# 2. sudo cp deploy/nginx-ip.conf /etc/nginx/sites-available/esperanza
# 3. sudo ln -sf /etc/nginx/sites-available/esperanza /etc/nginx/sites-enabled/
# 4. sudo rm -f /etc/nginx/sites-enabled/default
# 5. sudo nginx -t && sudo systemctl reload nginx
# 6. sudo ufw allow 80/tcp   (если включён firewall)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
